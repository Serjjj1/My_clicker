<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой кликер</title>
    <style>
        body { text-align: center; font-family: Arial; margin-top: 50px; }
        #counter { font-size: 48px; font-weight: bold; color: #0088cc; }
        button { font-size: 24px; padding: 15px 30px; background: #ffcc00; border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <h1>🍪 Кликер</h1>
    <div id="counter">0</div>
    <br>
    <button onclick="clickCookie()">Кликни меня!</button>

    <script>
        let count = 0;
        function clickCookie() {
            count++;
            document.getElementById('counter').innerText = count;
            // Вибрация на телефоне (если доступно)
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
