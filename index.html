<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Печеньковый кликер</title>
    <style>
        * {
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: url('bg.png');
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    overflow-x: hidden;
    position: fixed;
    width: 100%;
}

/* Основной контент - растягивается на всю высоту */
.screen {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

.screen.active {
    display: flex;
}

/* === ГЛАВНЫЙ ЭКРАН === */
#mainScreen {
    justify-content: center;
    padding: 20px 20px 0 20px;
    background-image: url('bg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.score-display {
    font-size: 56px;
    font-weight: 900;
    color: #ffeedd;
    text-align: center;
    margin-bottom: 30px;
    text-shadow: 
    2px 2px 0 #5c2e0e,
    4px 4px 0 rgba(0,0,0,0.3),
    0 0 15px rgba(255,215,0,0.5);
    background: transparent;
    padding: 10px 20px;
    letter-spacing: 2px;
}

.cookie-image {
    width: 95%;
    max-width: 450px;
    height: auto;
    cursor: pointer;
    transition: transform 0.05s linear;
    filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
    margin: 0 auto;
    display: block;
    flex-shrink: 0;
}

.cookie-image:active {
    transform: scale(0.97);
}

/* Пустой блок для баланса на главном экране */
.spacer {
    height: 10px;
}

/* === МАГАЗИН (два столбца) === */
.shop-container {
    display: flex;
    flex-direction: row;
    width: 100%;
    gap: 15px;
    padding: 10px;
    flex: 1;
    align-items: stretch;
}

.shop-column {
    flex: 1;
    background: rgba(255,245,215,0.8);
    border-radius: 30px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    backdrop-filter: blur(5px);
}

.shop-column h3 {
    text-align: center;
    color: #8b4513;
    margin: 0 0 10px 0;
    font-size: 20px;
}

.upgrade-card {
    background: #fff;
    border-radius: 20px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: transform 0.1s;
}

.upgrade-card:active {
    transform: scale(0.98);
}

.upgrade-name {
    font-weight: bold;
    font-size: 18px;
    color: #c47b3e;
}

.upgrade-level {
    font-size: 14px;
    color: #666;
    margin: 5px 0;
}

.upgrade-cost {
    background: #ffd966;
    border-radius: 20px;
    padding: 5px 10px;
    display: inline-block;
    font-weight: bold;
    color: #8b4513;
}

/* === РЕЙТИНГ (заглушка) === */
.coming-soon {
    text-align: center;
    background: rgba(255,255,255,0.8);
    padding: 30px;
    border-radius: 40px;
    font-size: 24px;
    color: #a0522d;
}

/* === НАВБАР === */
.navbar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    /* Основной золотой цвет (как слиток) */
    background: rgba(255, 200, 50, 0.85) !important;
    /* Эффект свечения (драгоценность) */
    backdrop-filter: blur(20px);
    padding: 14px 20px;
    border-radius: 35px 35px 0 0;
    margin: 0;
    flex-shrink: 0;
    background-clip: padding-box;
    box-shadow: none;
    /* Бриллиантовая граница: верхняя тонкая золотая, боковые — будто огранка */
    border-top: 2px solid rgba(255, 230, 100, 0.9);
    border-left: 1px solid rgba(255, 230, 100, 0.4);
    border-right: 1px solid rgba(255, 230, 100, 0.4);
    margin-bottom: 0;
    /* Добавляем внутреннее сияние */
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.3), inset 0 1px 4px rgba(255, 255, 200, 0.6);
}

.nav-btn {
    background: none;
    border: none;
    font-size: 22px;
    color: white;
    padding: 10px 20px;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
    flex: 1;
    text-align: center;
}

.nav-btn.active {
    background: #ffd966;
    color: #8b4513;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    transform: scale(1.02);
}

/* Аудиоплееры (скрытые) */
audio {
    display: none;
}

/* Адаптация для совсем узких экранов */
@media (max-width: 600px) {
    .score-display {
        font-size: 36px;
        padding: 8px 20px;
    }
    .nav-btn {
        font-size: 16px;
        padding: 8px;
    }
    .shop-column h3 {
        font-size: 16px;
    }
    .upgrade-name {
        font-size: 14px;
    }
}
/* Единый фон для всего экрана */
html {
    background: transparent;
    height: 100%;
    margin: 0;
    padding: 0;
}

body::before {
    display: none;
}

/* Навбар — только размытие, без своего фона */
.navbar {
    background: transparent;
    backdrop-filter: blur(20px);
}

/* === ШКАЛА ЭНЕРГИИ === */
.energy-bar-container {
    width: 85%;
    max-width: 350px;
    height: 30px;
    background-color: rgba(60, 60, 80, 0.7);
    border-radius: 30px;
    margin: 25px auto 15px auto;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255, 215, 0, 0.5);
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.energy-bar-fill {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #ffd966, #ffaa33);
    border-radius: 30px;
    transition: width 0.2s ease-out;
    box-shadow: inset 0 1px 3px rgba(255,255,200,0.6);
}

.energy-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    font-weight: bold;
    color: white;
    text-shadow: 1px 1px 0 #333;
    letter-spacing: 1px;
}
</style>
<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="mainScreen" class="screen active">
    <div class="score-display" id="score">0</div>
    <img src="cookie.png" alt="Процессор" class="cookie-image" id="cookieImg" onclick="clickCookie(event)">
    
    <!-- Шкала силы / энергии -->
    <div class="energy-bar-container">
        <div class="energy-bar-fill" id="energyFill"></div>
        <div class="energy-text" id="energyText">0 / 500</div>
    </div>
</div>

<!-- ЭКРАН МАГАЗИНА -->
<div id="shopScreen" class="screen">
    <div class="shop-container">
        <!-- Левый столбец: Улучшение клика -->
        <div class="shop-column">
            <h3>📈 Улучшение клика</h3>
            <div class="upgrade-card" onclick="buyUpgrade()">
                <div class="upgrade-name">Мощность клика</div>
                <div class="upgrade-level">Уровень: <span id="clickLevel">1</span></div>
                <div class="upgrade-cost">Цена: <span id="upgradeCost">50</span></div>
            </div>
        </div>
        
        <!-- Правый столбец: Автокликер -->
        <div class="shop-column">
            <h3>🤖 Автокликер</h3>
            <div class="upgrade-card" onclick="buyAuto()">
                <div class="upgrade-name">Робот-пекарь</div>
                <div class="upgrade-level">Количество: <span id="autoCount">0</span></div>
                <div class="upgrade-cost">Цена: <span id="autoCost">100</span></div>
            </div>
        </div>
    </div>
</div>

<!-- ЭКРАН РЕЙТИНГА -->
<div id="ratingScreen" class="screen">
    <div class="coming-soon">
        🏆 Рейтинг<br>
        <span style="font-size: 16px;">Находится в разработке</span>
    </div>
</div>

<!-- НАВБАР -->
<div class="navbar">
    <button class="nav-btn" data-screen="main">🏠 Главная</button>
    <button class="nav-btn" data-screen="shop">🛒 Магазин</button>
    <button class="nav-btn" data-screen="rating">🏆 Рейтинг</button>
</div>

<!-- Аудиоплееры -->
<audio id="clickSound0" preload="auto">
    <source src="clicking.wav" type="audio/wav">
</audio>
<audio id="clickSound1" preload="auto">
    <source src="clicking.wav" type="audio/wav">
</audio>
<audio id="clickSound2" preload="auto">
    <source src="clicking.wav" type="audio/wav">
</audio>
<audio id="clickSound3" preload="auto">
    <source src="clicking.wav" type="audio/wav">
</audio>
<audio id="clickSound4" preload="auto">
    <source src="clicking.wav" type="audio/wav">
</audio>
    
<script>
    // === ИГРОВЫЕ ПЕРЕМЕННЫЕ ===
    let score = localStorage.score ? parseInt(localStorage.score) : 0;
    let clickLevel = localStorage.clickLevel ? parseInt(localStorage.clickLevel) : 1;
    let autoClickers = localStorage.autoClickers ? parseInt(localStorage.autoClickers) : 0;
    
    // Переменные энергии
    let maxEnergy = 500;
    let currentEnergy = localStorage.currentEnergy ? parseInt(localStorage.currentEnergy) : 500;
    
    // Звуковой индекс
    let soundIndex = 0;
    
    // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
    function save() {
        localStorage.score = score;
        localStorage.clickLevel = clickLevel;
        localStorage.autoClickers = autoClickers;
        localStorage.currentEnergy = currentEnergy;
        updateUI();
    }
    
    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('clickLevel').innerText = clickLevel;
        document.getElementById('autoCount').innerText = autoClickers;
        document.getElementById('upgradeCost').innerText = Math.floor(50 + clickLevel * 1.5);
        document.getElementById('autoCost').innerText = Math.floor(100 + autoClickers * 1.8);
        
        // Обновляем шкалу энергии
        let energyPercent = (currentEnergy / maxEnergy) * 100;
        let energyFill = document.getElementById('energyFill');
        if (energyFill) energyFill.style.width = energyPercent + '%';
        
        let energyText = document.getElementById('energyText');
        if (energyText) energyText.innerText = Math.floor(currentEnergy) + ' / ' + maxEnergy;
    }
    
    function vibrate(duration) {
        if (navigator.vibrate) navigator.vibrate(duration);
    }
    
    function playClickSound() {
        let soundId = 'clickSound' + soundIndex;
        let audioElement = document.getElementById(soundId);
        if (!audioElement) return;
        audioElement.pause();
        audioElement.currentTime = 0;
        audioElement.play().catch(e => console.log("Звук заблокирован"));
        soundIndex = (soundIndex + 1) % 5;
    }
    
    // === ИГРОВЫЕ ФУНКЦИИ ===
    function clickCookie(event) {
        // Проверка энергии
        if (currentEnergy < 1) {
            vibrate(50);
            return;
        }
        
        // Тратим энергию
        currentEnergy -= 1;
        
        vibrate(50);
        playClickSound();
        
        score += clickLevel;
        save();
        
        // Анимация нажатия
        let cookieImg = document.getElementById('cookieImg');
        if (cookieImg) {
            cookieImg.style.transform = 'scale(0.97)';
            setTimeout(() => cookieImg.style.transform = '', 80);
        }
        
        // Всплывающий текст
        let floatText = document.createElement('div');
        floatText.innerText = '+'+clickLevel;
        let clickX = event.touches ? event.touches[0].clientX : event.clientX;
        let clickY = event.touches ? event.touches[0].clientY : event.clientY;
        floatText.style.position = 'fixed';
        floatText.style.left = (clickX - 20) + 'px';
        floatText.style.top = (clickY - 30) + 'px';
        floatText.style.fontSize = '28px';
        floatText.style.fontWeight = 'bold';
        floatText.style.color = '#ffaa33';
        floatText.style.textShadow = '1px 1px 0 #8b4513';
        floatText.style.pointerEvents = 'none';
        floatText.style.zIndex = '1000';
        document.body.appendChild(floatText);
        setTimeout(() => floatText.remove(), 500);
    }
    
    function buyUpgrade() {
        let cost = Math.floor(50 + clickLevel * 1.5);
        if (score >= cost) {
            score -= cost;
            clickLevel++;
            vibrate(100);
            playClickSound();
            save();
        } else {
            vibrate(100);
        }
    }
    
    function buyAuto() {
        let cost = Math.floor(100 + autoClickers * 1.8);
        if (score >= cost) {
            score -= cost;
            autoClickers++;
            vibrate(100);
            playClickSound();
            save();
        } else {
            vibrate(100);
        }
    }
    
    // === НАВИГАЦИЯ ===
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(screen => {
            screen.classList.remove('active');
        });
        let targetScreen = document.getElementById(screenId + 'Screen');
        if (targetScreen) targetScreen.classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-screen') === screenId) {
                btn.classList.add('active');
            }
        });
    }
    
    // === АВТОКЛИКЕР ===
    setInterval(() => {
        if (autoClickers > 0) {
            score += autoClickers;
            save();
        }
    }, 3000);
    
    // === ВОССТАНОВЛЕНИЕ ЭНЕРГИИ ===
    setInterval(() => {
        if (currentEnergy < maxEnergy) {
            currentEnergy = Math.min(currentEnergy + 10, maxEnergy);
            save();
        }
    }, 1000);
    
    // === ЗАПУСК И НАСТРОЙКА ===
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            let screen = btn.getAttribute('data-screen');
            showScreen(screen);
        });
    });
    
    updateUI();
    
    // Пробуждение звука первым касанием
    document.body.addEventListener('touchstart', function() {}, { once: true });
</script>
</body>
    </html>
