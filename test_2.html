<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Майнинг кликер</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url('bg.png') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen.active {
            display: flex;
        }

        #mainScreen {
            justify-content: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: 900;
            color: #ffeedd;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #5c2e0e, 4px 4px 0 rgba(0,0,0,0.3), 0 0 15px rgba(255,215,0,0.5);
        }

        .cookie-image {
            width: 75%;
            max-width: 300px;
            cursor: pointer;
            transition: transform 0.05s linear;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
        }

        .cookie-image:active {
            transform: scale(0.97);
        }

        .energy-bar-container {
            width: 85%;
            max-width: 350px;
            height: 30px;
            background-color: rgba(60, 60, 80, 0.7);
            border-radius: 30px;
            margin: 20px auto 10px auto;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .energy-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd966, #ffaa33);
            border-radius: 30px;
            transition: width 0.2s ease-out;
        }

        .energy-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 #333;
        }

        .shop-tabs {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 5px;
        }

        .shop-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            background: rgba(255,245,215,0.5);
            border-radius: 35px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .shop-tab.active {
            background: rgba(255, 200, 50, 0.85);
            color: #5c2e0e;
            box-shadow: 0 0 10px gold;
        }

        .upgrades-list {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .upgrades-list.active {
            display: flex;
        }

        .upgrade-item {
            background: rgba(30,30,40,0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ffd966;
            cursor: pointer;
            transition: 0.1s;
        }

        .upgrade-item:active {
            transform: scale(0.98);
        }

        .upgrade-name {
            font-weight: bold;
            color: #ffd966;
            font-size: 16px;
        }

        .upgrade-desc {
            font-size: 12px;
            color: #ccc;
        }

        .upgrade-level {
            font-size: 11px;
            color: #ffd966;
        }

        .upgrade-price {
            background: #ffaa33;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            color: #2c1a0e;
            font-size: 14px;
        }

        /* Красивый навбар из index.html */
        .navbar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255, 200, 50, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 35px 35px 0 0;
            flex-shrink: 0;
            border-top: 2px solid rgba(255, 230, 100, 0.9);
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            text-align: center;
        }

        .nav-btn.active {
            background: #ffd966;
            color: #8b4513;
        }
    </style>
</head>
<body>

<div id="mainScreen" class="screen active">
    <div class="score-display" id="score">0.000</div>
    <img src="cookie.png" id="cookieImg" class="cookie-image" alt="Процессор">
    <div class="energy-bar-container">
        <div class="energy-bar-fill" id="energyFill"></div>
        <div class="energy-text" id="energyText">500 / 500</div>
    </div>
</div>

<div id="shopScreen" class="screen">
    <div class="shop-tabs">
        <div class="shop-tab active" data-tab="power">Мощность</div>
        <div class="shop-tab" data-tab="mining">Майнинг</div>
        <div class="shop-tab" data-tab="energy">Выносливость</div>
    </div>
    <div id="powerUpgrades" class="upgrades-list active"></div>
    <div id="miningUpgrades" class="upgrades-list"></div>
    <div id="energyUpgrades" class="upgrades-list"></div>
</div>

<div id="ratingScreen" class="screen">
    <div style="text-align:center; margin-top:100px; font-size:20px;">Рейтинг<br><small style="color:#aaa;">В разработке</small></div>
</div>

<!-- Навбар из оригинального index.html -->
<div class="navbar">
    <button class="nav-btn active" data-screen="main">Главная</button>
    <button class="nav-btn" data-screen="shop">Магазин</button>
    <button class="nav-btn" data-screen="rating">Рейтинг</button>
</div>

<script>
// ==================== ПЕРЕМЕННЫЕ ====================
let balance = 0;
let clickPower = 0.01;
let passiveMining = 0;
let maxEnergy = 500;
let currentEnergy = 500;
let energyRegen = 5;

const ENERGY_COST_PER_CLICK = 1;

// ==================== УЛУЧШЕНИЯ ИЗ index.html ====================
const powerUpgrades = [
    { id: "p1", name: "Младший транзистор", basePrice: 0.5,  bonus: 0.001, multiplier: 1.4, level: 0 },
    { id: "p2", name: "Логический элемент", basePrice: 2,    bonus: 0.005, multiplier: 1.4, level: 0 },
    { id: "p3", name: "Интегральная схема", basePrice: 10,   bonus: 0.03,  multiplier: 1.5, level: 0 },
    { id: "p4", name: "Тактовый генератор", basePrice: 25,   bonus: 0.35,  multiplier: 1.5, level: 0 },   // скорректировал под твои ранние данные
    { id: "p5", name: "Кремниевая пластина", basePrice: 100, bonus: 1,     multiplier: 1.6, level: 0 }
];

const miningUpgrades = [
    { id: "m1", name: "Ферма из GPU",      basePrice: 2,    bonus: 0.001, multiplier: 1.5, level: 0 },
    { id: "m2", name: "ASIC-майнер",       basePrice: 10,   bonus: 0.005, multiplier: 1.5, level: 0 },
    { id: "m3", name: "Майнинг-пул",       basePrice: 50,   bonus: 0.03,  multiplier: 1.6, level: 0 },
    { id: "m4", name: "Ферма ASIC",        basePrice: 250,  bonus: 0.15,  multiplier: 1.7, level: 0 },
    { id: "m5", name: "Дата-центр",        basePrice: 1000, bonus: 0.65,  multiplier: 1.7, level: 0 }
];

const energyUpgrades = [
    { id: "e1", name: "Реген энергии",      basePrice: 20, bonus: 1,   multiplier: 3.00, level: 0, type: "regen" },
    { id: "e2", name: "Максимум энергии",   basePrice: 10, bonus: 500, multiplier: 3.00, level: 0, type: "max" }
];

// ==================== ЗВУКИ ====================
const clickSounds = [];
for (let i = 0; i < 5; i++) {
    const audio = new Audio('clicking.wav');
    audio.volume = 0.6;
    clickSounds.push(audio);
}
let soundIndex = 0;

function playClickSound() {
    const sound = clickSounds[soundIndex];
    sound.currentTime = 0;
    sound.play().catch(() => {});
    soundIndex = (soundIndex + 1) % 5;
}

// ==================== ФОРМАТИРОВАНИЕ ====================
function formatBalance(n) { return Number(n).toFixed(3); }
function formatClick(n) { return Number(n).toFixed(2); }

// Плавающий текст
function createFloatingText(value, clientX, clientY) {
    const el = document.createElement('div');
    el.textContent = `+${formatClick(value)}`;
    el.style.cssText = `position:absolute; left:\( {clientX}px; top: \){clientY-40}px; font-size:26px; font-weight:bold; color:#ffeb3b; text-shadow:2px 2px 4px #000; pointer-events:none; z-index:999; transition:all 1.2s ease-out;`;
    document.body.appendChild(el);
    setTimeout(() => { el.style.transform = 'translateY(-90px)'; el.style.opacity = '0'; }, 10);
    setTimeout(() => el.remove(), 1400);
}

// Клик
document.getElementById('cookieImg').addEventListener('click', (e) => {
    if (currentEnergy < ENERGY_COST_PER_CLICK) return;
    const gain = clickPower;
    balance += gain;
    currentEnergy -= ENERGY_COST_PER_CLICK;

    createFloatingText(gain, e.clientX, e.clientY);
    playClickSound();
    updateUI();
});

// Покупка
function buyUpgrade(arr, idx, cat) {
    const up = arr[idx];
    const price = up.basePrice * Math.pow(up.multiplier, up.level);
    if (balance < price) return;

    balance -= price;
    up.level++;

    if (cat === 'power') clickPower += up.bonus;
    else if (cat === 'mining') passiveMining += up.bonus;
    else if (cat === 'energy') {
        if (up.type === 'regen') energyRegen += up.bonus;
        else maxEnergy += up.bonus;
    }

    updateUI();
    renderShop();
}

// Отрисовка магазина
function renderShop() {
    let html = '';
    powerUpgrades.forEach((up, i) => {
        const price = (up.basePrice * Math.pow(up.multiplier, up.level)).toFixed(3);
        html += `<div class="upgrade-item" onclick="buyUpgrade(powerUpgrades, ${i}, 'power')">
            <div><div class="upgrade-name">\( {up.name}</div><div class="upgrade-desc"> \){up.desc || '+' + up.bonus}</div><div class="upgrade-level">Уровень: ${up.level}</div></div>
            <div class="upgrade-price">${price}</div>
        </div>`;
    });
    document.getElementById('powerUpgrades').innerHTML = html;

    html = '';
    miningUpgrades.forEach((up, i) => {
        const price = (up.basePrice * Math.pow(up.multiplier, up.level)).toFixed(3);
        html += `<div class="upgrade-item" onclick="buyUpgrade(miningUpgrades, ${i}, 'mining')">
            <div><div class="upgrade-name">\( {up.name}</div><div class="upgrade-desc">+ \){up.bonus} энергии/сек</div><div class="upgrade-level">Уровень: ${up.level}</div></div>
            <div class="upgrade-price">${price}</div>
        </div>`;
    });
    document.getElementById('miningUpgrades').innerHTML = html;

    html = '';
    energyUpgrades.forEach((up, i) => {
        const price = (up.basePrice * Math.pow(up.multiplier, up.level)).toFixed(3);
        const desc = up.type === 'regen' ? `+\( {up.bonus} к регену` : `+ \){up.bonus} к максимуму`;
        html += `<div class="upgrade-item" onclick="buyUpgrade(energyUpgrades, ${i}, 'energy')">
            <div><div class="upgrade-name">\( {up.name}</div><div class="upgrade-desc"> \){desc}</div><div class="upgrade-level">Уровень: ${up.level}</div></div>
            <div class="upgrade-price">${price}</div>
        </div>`;
    });
    document.getElementById('energyUpgrades').innerHTML = html;
}

// UI
function updateUI() {
    document.getElementById('score').textContent = formatBalance(balance);
    const percent = Math.min(100, (currentEnergy / maxEnergy) * 100);
    document.getElementById('energyFill').style.width = percent + '%';
    document.getElementById('energyText').textContent = `${Math.floor(currentEnergy)} / ${Math.floor(maxEnergy)}`;
}

// Пассив
setInterval(() => {
    balance += passiveMining / 10;
    if (currentEnergy < maxEnergy) currentEnergy = Math.min(maxEnergy, currentEnergy + energyRegen / 10);
    updateUI();
}, 100);

// Навигация
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(btn.dataset.screen + 'Screen').classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

// Табы
document.querySelectorAll('.shop-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.upgrades-list').forEach(l => l.classList.remove('active'));
        document.getElementById(tab.dataset.tab + 'Upgrades').classList.add('active');
    });
});

// Запуск
window.addEventListener('load', () => {
    renderShop();
    updateUI();
});
</script>
</body>
</html>
