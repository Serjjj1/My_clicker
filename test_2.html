<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Майнинг кликер</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen.active {
            display: flex;
        }

        #mainScreen {
            justify-content: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: 900;
            color: #ffeedd;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #5c2e0e, 4px 4px 0 rgba(0,0,0,0.3), 0 0 15px rgba(255,215,0,0.5);
        }

        .cookie-image {
            width: 75%;
            max-width: 300px;
            cursor: pointer;
            transition: transform 0.05s linear;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3));
        }

        .cookie-image:active {
            transform: scale(0.97);
        }

        .energy-bar-container {
            width: 85%;
            max-width: 350px;
            height: 30px;
            background-color: rgba(60, 60, 80, 0.7);
            border-radius: 30px;
            margin: 20px auto 10px auto;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .energy-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ffd966, #ffaa33);
            border-radius: 30px;
            transition: width 0.2s ease-out;
        }

        .energy-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 #333;
        }

        .shop-tabs {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 5px;
        }

        .shop-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            background: rgba(255,245,215,0.5);
            border-radius: 35px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .shop-tab.active {
            background: rgba(255, 200, 50, 0.85);
            color: #5c2e0e;
            box-shadow: 0 0 10px gold;
        }

        .upgrades-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .upgrade-item {
            background: rgba(30,30,40,0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ffd966;
            cursor: pointer;
            transition: 0.1s;
        }

        .upgrade-item:active {
            transform: scale(0.98);
        }

        .upgrade-info {
            flex: 2;
        }

        .upgrade-name {
            font-weight: bold;
            color: #ffd966;
            font-size: 16px;
        }

        .upgrade-desc {
            font-size: 12px;
            color: #ccc;
        }

        .upgrade-level {
            font-size: 11px;
            color: #ffd966;
        }

        .upgrade-stats {
            flex: 1;
            text-align: right;
        }

        .upgrade-price {
            background: #ffaa33;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            color: #2c1a0e;
            font-size: 14px;
        }

        .navbar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255, 200, 50, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 35px 35px 0 0;
            flex-shrink: 0;
            border-top: 2px solid rgba(255, 230, 100, 0.9);
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            text-align: center;
        }

        .nav-btn.active {
            background: #ffd966;
            color: #8b4513;
        }

        audio { display: none; }
        .coming-soon { text-align:center; background:rgba(0,0,0,0.6); padding:30px; border-radius:40px; color:white; }
    </style>
</head>
<body>

<div id="mainScreen" class="screen active">
    <div class="score-display" id="score">0.000</div>
    <img src="cookie.png" alt="Процессор" class="cookie-image" id="cookieImg">
    <div class="energy-bar-container">
        <div class="energy-bar-fill" id="energyFill"></div>
        <div class="energy-text" id="energyText">0 / 500</div>
    </div>
</div>

<div id="shopScreen" class="screen">
    <div class="shop-tabs">
        <div class="shop-tab active" data-tab="power">Мощность</div>
        <div class="shop-tab" data-tab="mining">Майнинг</div>
        <div class="shop-tab" data-tab="energy">Выносливость</div>
    </div>
    <div id="powerUpgrades" class="upgrades-list"></div>
    <div id="miningUpgrades" class="upgrades-list" style="display:none;"></div>
    <div id="energyUpgrades" class="upgrades-list" style="display:none;"></div>
</div>

<div id="ratingScreen" class="screen">
    <div class="coming-soon">Рейтинг<br><span style="font-size:16px;">В разработке</span></div>
</div>

<div class="navbar">
    <button class="nav-btn active" data-screen="main">Главная</button>
    <button class="nav-btn" data-screen="shop">Магазин</button>
    <button class="nav-btn" data-screen="rating">Рейтинг</button>
</div>

<script>
// ==================== Telegram WebApp ====================
const tg = window.Telegram.WebApp || {};
tg.ready && tg.ready();
tg.expand && tg.expand();

// ==================== ПЕРЕМЕННЫЕ ИГРЫ ====================
let balance = 0;
let clickPower = 0.01;
let passiveMining = 0;
let maxEnergy = 500;
let currentEnergy = 500;
let energyRegen = 5;

const ENERGY_COST_PER_CLICK = 1;

// ==================== УЛУЧШЕНИЯ ====================
const powerUpgrades = [
    { id: "p1", name: "Мощность клика I",  basePrice: 0.5,  bonus: 0.001, multiplier: 1.40, level: 0 },
    { id: "p2", name: "Мощность клика II", basePrice: 2,    bonus: 0.005, multiplier: 1.40, level: 0 },
    { id: "p3", name: "Мощность клика III",basePrice: 10,   bonus: 0.03,  multiplier: 1.50, level: 0 },
    { id: "p4", name: "Мощность клика IV", basePrice: 100,  bonus: 0.35,  multiplier: 1.50, level: 0 },
    { id: "p5", name: "Мощность клика V",  basePrice: 250,  bonus: 1,     multiplier: 1.60, level: 0 }
];

const miningUpgrades = [
    { id: "m1", name: "Скорость майнинга I",  basePrice: 2,    bonus: 0.001, multiplier: 1.50, level: 0 },
    { id: "m2", name: "Скорость майнинга II", basePrice: 10,   bonus: 0.005, multiplier: 1.50, level: 0 },
    { id: "m3", name: "Скорость майнинга III",basePrice: 50,   bonus: 0.03,  multiplier: 1.60, level: 0 },
    { id: "m4", name: "Скорость майнинга IV", basePrice: 250,  bonus: 0.15,  multiplier: 1.70, level: 0 },
    { id: "m5", name: "Скорость майнинга V",  basePrice: 1000, bonus: 0.65,  multiplier: 1.70, level: 0 }
];

const energyUpgrades = [
    { id: "e1", name: "Реген энергии",      basePrice: 20, bonus: 1,   multiplier: 3.00, level: 0, type: "regen" },
    { id: "e2", name: "Максимум энергии",   basePrice: 10, bonus: 500, multiplier: 3.00, level: 0, type: "max" }
];

// ==================== ЗВУКИ (5 штук) ====================
const clickSounds = [];
for (let i = 0; i < 5; i++) {
    const audio = new Audio('clicking.wav');
    audio.volume = 0.65;
    clickSounds.push(audio);
}
let soundIndex = 0;

function playClickSound() {
    const sound = clickSounds[soundIndex];
    sound.currentTime = 0;
    sound.play().catch(() => {});
    soundIndex = (soundIndex + 1) % 5;
}

// ==================== ФОРМАТИРОВАНИЕ ====================
function formatBalance(num) {
    return Number(num).toFixed(3);
}

function formatClick(num) {
    return Number(num).toFixed(2);
}

// ==================== ПЛАВАЮЩИЙ ТЕКСТ ====================
function createFloatingText(value, x, y) {
    const float = document.createElement('div');
    float.textContent = `+${formatClick(value)}`;
    float.style.cssText = `
        position: absolute; left: ${x}px; top: ${y}px; 
        font-size: 24px; font-weight: bold; color: #ffeb3b; 
        text-shadow: 2px 2px 4px #000; pointer-events: none; 
        z-index: 100; transition: all 1.2s ease-out;
    `;
    document.body.appendChild(float);

    setTimeout(() => {
        float.style.transform = 'translateY(-90px)';
        float.style.opacity = '0';
    }, 10);

    setTimeout(() => float.remove(), 1400);
}

// ==================== КЛИК ====================
function clickChip(e) {
    if (currentEnergy < ENERGY_COST_PER_CLICK) return;

    const gain = clickPower;
    balance += gain;
    currentEnergy -= ENERGY_COST_PER_CLICK;

    const rect = e.currentTarget.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const clickY = e.clientY - rect.top;

    createFloatingText(gain, rect.left + clickX, rect.top + clickY);
    playClickSound();
    updateUI();
}

// ==================== ПОКУПКА УЛУЧШЕНИЯ ====================
function buyUpgrade(upgradeArray, index, category) {
    const upgrade = upgradeArray[index];
    const price = upgrade.basePrice * Math.pow(upgrade.multiplier, upgrade.level);

    if (balance < price) return;

    balance -= price;
    upgrade.level++;

    if (category === 'power') clickPower += upgrade.bonus;
    else if (category === 'mining') passiveMining += upgrade.bonus;
    else if (category === 'energy') {
        if (upgrade.type === 'regen') energyRegen += upgrade.bonus;
        else if (upgrade.type === 'max') maxEnergy += upgrade.bonus;
    }

    updateUI();
    renderShop();
}

// ==================== ОТРИСОВКА МАГАЗИНА ====================
function renderShop() {
    // Power
    let html = '';
    powerUpgrades.forEach((up, i) => {
        const price = up.basePrice * Math.pow(up.multiplier, up.level);
        html += `
            <div class="upgrade-item" onclick="buyUpgrade(powerUpgrades, ${i}, 'power')">
                <div class="upgrade-info">
                    <div class="upgrade-name">${up.name}</div>
                    <div class="upgrade-desc">+${up.bonus} мощности</div>
                    <div class="upgrade-level">Уровень: ${up.level}</div>
                </div>
                <div class="upgrade-stats">
                    <div class="upgrade-price">${formatBalance(price)}</div>
                </div>
            </div>`;
    });
    document.getElementById('powerUpgrades').innerHTML = html;

    // Mining
    html = '';
    miningUpgrades.forEach((up, i) => {
        const price = up.basePrice * Math.pow(up.multiplier, up.level);
        html += `
            <div class="upgrade-item" onclick="buyUpgrade(miningUpgrades, ${i}, 'mining')">
                <div class="upgrade-info">
                    <div class="upgrade-name">${up.name}</div>
                    <div class="upgrade-desc">+${up.bonus} энергии/сек</div>
                    <div class="upgrade-level">Уровень: ${up.level}</div>
                </div>
                <div class="upgrade-stats">
                    <div class="upgrade-price">${formatBalance(price)}</div>
                </div>
            </div>`;
    });
    document.getElementById('miningUpgrades').innerHTML = html;

    // Energy
    html = '';
    energyUpgrades.forEach((up, i) => {
        const price = up.basePrice * Math.pow(up.multiplier, up.level);
        const desc = up.type === 'regen' ? `+\( {up.bonus} реген` : `+ \){up.bonus} макс. энергии`;
        html += `
            <div class="upgrade-item" onclick="buyUpgrade(energyUpgrades, ${i}, 'energy')">
                <div class="upgrade-info">
                    <div class="upgrade-name">${up.name}</div>
                    <div class="upgrade-desc">${desc}</div>
                    <div class="upgrade-level">Уровень: ${up.level}</div>
                </div>
                <div class="upgrade-stats">
                    <div class="upgrade-price">${formatBalance(price)}</div>
                </div>
            </div>`;
    });
    document.getElementById('energyUpgrades').innerHTML = html;
}

// ==================== ОБНОВЛЕНИЕ UI ====================
function updateUI() {
    document.getElementById('score').textContent = formatBalance(balance);

    const percent = Math.min(100, (currentEnergy / maxEnergy) * 100);
    document.getElementById('energyFill').style.width = percent + '%';
    document.getElementById('energyText').textContent = `${formatBalance(currentEnergy)} / ${Math.floor(maxEnergy)}`;
}

// ==================== СОХРАНЕНИЕ И ЗАГРУЗКА ====================
async function saveProgress() {
    const saveData = {
        balance,
        clickPower,
        passiveMining,
        maxEnergy,
        energyRegen,
        currentEnergy,
        powerUpgrades: powerUpgrades.map(u => ({id: u.id, level: u.level})),
        miningUpgrades: miningUpgrades.map(u => ({id: u.id, level: u.level})),
        energyUpgrades: energyUpgrades.map(u => ({id: u.id, level: u.level})),
        lastSave: Date.now()
    };

    try {
        if (tg.CloudStorage) {
            await tg.CloudStorage.setItem('clickerSave_v2', JSON.stringify(saveData));
        } else {
            localStorage.setItem('clickerSave_v2', JSON.stringify(saveData));
        }
    } catch (e) {
        localStorage.setItem('clickerSave_v2', JSON.stringify(saveData));
    }
}

async function loadProgress() {
    let data = null;

    try {
        if (tg.CloudStorage) {
            const saved = await tg.CloudStorage.getItem('clickerSave_v2');
            if (saved) data = JSON.parse(saved);
        }
    } catch (e) {}

    if (!data) {
        const local = localStorage.getItem('clickerSave_v2');
        if (local) data = JSON.parse(local);
    }

    if (data) {
        balance = data.balance || 0;
        clickPower = data.clickPower || 0.01;
        passiveMining = data.passiveMining || 0;
        maxEnergy = data.maxEnergy || 500;
        energyRegen = data.energyRegen || 5;
        currentEnergy = Math.min(data.currentEnergy || maxEnergy, maxEnergy);

        // Загружаем уровни
        if (data.powerUpgrades) data.powerUpgrades.forEach(s => {
            const u = powerUpgrades.find(x => x.id === s.id);
            if (u) u.level = s.level || 0;
        });
        if (data.miningUpgrades) data.miningUpgrades.forEach(s => {
            const u = miningUpgrades.find(x => x.id === s.id);
            if (u) u.level = s.level || 0;
        });
        if (data.energyUpgrades) data.energyUpgrades.forEach(s => {
            const u = energyUpgrades.find(x => x.id === s.id);
            if (u) u.level = s.level || 0;
        });
    }

    updateUI();
    renderShop();
}

// ==================== ПАССИВНЫЙ ДОХОД ====================
setInterval(() => {
    balance += passiveMining / 10;           // плавный прирост
    if (currentEnergy < maxEnergy) {
        currentEnergy = Math.min(maxEnergy, currentEnergy + energyRegen / 10);
    }
    updateUI();
}, 100);

// Автосохранение
setInterval(saveProgress, 10000); // каждые 10 секунд

// Сохранение при закрытии/сворачивании
if (tg.onEvent) {
    tg.onEvent('deactivated', saveProgress);
    tg.onEvent('visibilityChanged', (isVisible) => {
        if (!isVisible) saveProgress();
    });
}

// ==================== НАВИГАЦИЯ ====================
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

        const screenId = btn.dataset.screen + 'Screen';
        document.getElementById(screenId).classList.add('active');
        btn.classList.add('active');
    });
});

// ==================== ТАБЫ В МАГАЗИНЕ ====================
document.querySelectorAll('.shop-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        document.getElementById('powerUpgrades').style.display = 'none';
        document.getElementById('miningUpgrades').style.display = 'none';
        document.getElementById('energyUpgrades').style.display = 'none';

        if (tab.dataset.tab === 'power') document.getElementById('powerUpgrades').style.display = 'flex';
        if (tab.dataset.tab === 'mining') document.getElementById('miningUpgrades').style.display = 'flex';
        if (tab.dataset.tab === 'energy') document.getElementById('energyUpgrades').style.display = 'flex';
    });
});

// ==================== ЗАПУСК ====================
document.getElementById('cookieImg').addEventListener('click', clickChip);

window.addEventListener('load', async () => {
    await loadProgress();
    renderShop();
    updateUI();
});
</script>
</body>
</html>
