<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Майнинг кликер</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            font-family: Arial, sans-serif;
            background: url('bg.png') center/cover no-repeat fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
        }
        .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; }

        .score { font-size: 50px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px gold; }
        #cookieImg { width: 70%; max-width: 280px; cursor: pointer; }
        #cookieImg:active { transform: scale(0.92); }

        .energy-bar {
            width: 80%; height: 28px; background: #333; border-radius: 20px; margin: 20px 0; position: relative; overflow: hidden;
        }
        .energy-fill {
            height: 100%; background: linear-gradient(to right, #ff0, #f80); width: 100%; transition: width 0.3s;
        }
        .energy-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }

        .navbar {
            display: flex; background: rgba(255,180,0,0.9); padding: 10px;
        }
        .nav-btn {
            flex: 1; padding: 12px; background: none; border: none; color: white; font-size: 18px; font-weight: bold;
        }
        .nav-btn.active { background: white; color: #b36b00; border-radius: 30px; }

        .shop-tabs { display: flex; gap: 5px; margin: 15px 0; }
        .shop-tab { flex: 1; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 20px; text-align: center; }
        .shop-tab.active { background: gold; color: #333; }

        .upgrade-item {
            background: rgba(0,0,0,0.6); margin: 8px 0; padding: 12px; border-radius: 15px; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<div id="mainScreen" class="screen active">
    <div class="score" id="score">0.000</div>
    <img src="cookie.png" id="cookieImg" alt="Клик">
    <div class="energy-bar">
        <div class="energy-fill" id="energyFill"></div>
        <div class="energy-text" id="energyText">500 / 500</div>
    </div>
</div>

<div id="shopScreen" class="screen">
    <div class="shop-tabs">
        <div class="shop-tab active" data-tab="power">Мощность</div>
        <div class="shop-tab" data-tab="mining">Майнинг</div>
        <div class="shop-tab" data-tab="energy">Выносливость</div>
    </div>
    <div id="upgradesContainer"></div>
</div>

<div id="ratingScreen" class="screen">
    <h2>Рейтинг</h2>
    <p>В разработке...</p>
</div>

<div class="navbar">
    <button class="nav-btn active" data-screen="main">Главная</button>
    <button class="nav-btn" data-screen="shop">Магазин</button>
    <button class="nav-btn" data-screen="rating">Рейтинг</button>
</div>

<script>
// Основные переменные
let balance = 0;
let clickPower = 0.001;
let currentEnergy = 500;
let maxEnergy = 500;

const ENERGY_COST = 1;

// Элементы
const scoreEl = document.getElementById('score');
const energyFill = document.getElementById('energyFill');
const energyText = document.getElementById('energyText');
const cookie = document.getElementById('cookieImg');

// Клик по процессору
cookie.addEventListener('click', (e) => {
    if (currentEnergy < ENERGY_COST) return;

    balance += clickPower;
    currentEnergy -= ENERGY_COST;

    // Плавающий текст
    const float = document.createElement('div');
    float.textContent = '+' + clickPower.toFixed(2);
    float.style.position = 'absolute';
    float.style.left = e.clientX + 'px';
    float.style.top = (e.clientY - 30) + 'px';
    float.style.fontSize = '24px';
    float.style.fontWeight = 'bold';
    float.style.color = '#ff0';
    float.style.pointerEvents = 'none';
    float.style.transition = 'all 1s';
    document.body.appendChild(float);

    setTimeout(() => {
        float.style.transform = 'translateY(-80px)';
        float.style.opacity = '0';
    }, 10);
    setTimeout(() => float.remove(), 1000);

    updateUI();
});

// Обновление интерфейса
function updateUI() {
    scoreEl.textContent = balance.toFixed(3);
    const percent = (currentEnergy / maxEnergy) * 100;
    energyFill.style.width = percent + '%';
    energyText.textContent = currentEnergy.toFixed(1) + ' / ' + maxEnergy;
}

// Навигация
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(btn.dataset.screen + 'Screen').classList.add('active');

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

// Табы магазина (пока заглушка)
document.querySelectorAll('.shop-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        // Здесь позже будет отрисовка улучшений
    });
});

// Пассивный реген энергии (каждые 100мс)
setInterval(() => {
    if (currentEnergy < maxEnergy) {
        currentEnergy = Math.min(maxEnergy, currentEnergy + 0.5);
    }
    updateUI();
}, 100);

updateUI(); // начальная отрисовка
</script>
</body>
</html>
